<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizer | AlgoLens</title>
    <meta name="description" content="AlgoLens visualizer — step through algorithm states rendered with D3.js">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/visualizer.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <a class="skip-link" href="#visualizer-canvas">Skip to visualizer</a>
    <header class="header" style="padding: 1rem 0;">
        <div class="container header-row" style="align-items: center; justify-content: space-between;">
            <div style="display:flex; gap:1rem; align-items:center;">
                <a class="logo" href="index.html">AlgoLens</a>
                <a href="index.html" class="btn btn-primary">Back</a>
            </div>
            <h2 id="problem-title" class="problem-heading">Problem Title</h2>
            <div style="display:flex; align-items:center; gap:0.75rem;">
                <div id="problem-difficulty" class="badge">Easy</div>
                <button type="button" class="btn btn-ghost theme-toggle" data-theme-toggle aria-pressed="false">
                    <span data-theme-label>Dark</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <div class="visualizer-container">
            <div class="canvas-area" id="visualizer-canvas">
                <!-- D3.js will render here -->
            </div>

            <aside class="side-panel">
                <div class="controls-card">
                    <h3>Controls</h3>
                    <div class="controls">
                        <button id="btn-prev" class="control-btn" title="Previous Step">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                        </button>
                        <button id="btn-play-pause" class="control-btn" title="Play/Pause">
                            <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
                            <svg id="pause-icon" style="display: none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                        </button>
                        <button id="btn-next" class="control-btn" title="Next Step">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                        </button>
                    </div>
                    <div style="margin-top: 1.5rem;">
                        <label style="font-size: 0.875rem; color: var(--text-muted);">Speed</label>
                        <input type="range" id="speed-slider" class="speed-control" min="100" max="2000" step="100" value="1000">
                    </div>
                </div>

                <div class="description-card">
                    <h3>Step Description</h3>
                    <div id="step-info" class="step-description">
                        <p>Loading algorithm steps...</p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script type="module" src="js/router.js"></script>
</body>
</html>
